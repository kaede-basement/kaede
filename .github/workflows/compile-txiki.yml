name: "Compile txiki.js (Linux)"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: "ubuntu-24.04"

    steps:
      - name: Check out a repository
        uses: actions/checkout@v4
        with:
          repository: saghul/txiki.js
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libffi-dev

      - name: Build txiki.js
        run: make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: "error"
          name: "txikijs-ubuntu-24.04"
          path: "build/tjs"
