name: 'Build'

on:
  push:
    paths-ignore:
      - ".gitignore"
      - "**.md"
      - flake.lock
    branches:
      - nightly
      - beta
      - rc
      - release

jobs:
  tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "macOS-ARM"
            platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - name: "macOS-x86_64"
            platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - name: "Linux"
            platform: 'ubuntu-22.04'
            args: ''
          - name: "Windows"
            platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Check out a repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install

      - name: Build a Tauri app (Nightly)
        if: github.ref == 'refs/heads/nightly'
        uses: tauri-apps/tauri-action@v0
        with:
          appName: 'App v__VERSION__'
          args: ${{ matrix.args }}

      - name: Build a Tauri app (Non-Nightly)
        if: github.ref != 'refs/heads/nightly'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Temporary
        run: |
          ls

      - name: Upload artifacts
        if: contains(github.ref, 'nightly')
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: 'warn'
          path: |
            # Windows
            'src-tauri\target\release\bundle\msi\kaede_0.1.0_x64_en-US.msi'
            'src-tauri\target\release\bundle\nsis\kaede_0.1.0_x64-setup.exe'
            # Linux
            'src-tauri/target/release/bundle/deb/kaede_0.1.0_amd64.deb'
            'src-tauri/target/release/bundle/rpm/kaede-0.1.0-1.x86_64.rpm'
            'src-tauri/target/release/bundle/appimage/kaede_0.1.0_amd64.AppImag'
            # macOS x86_64
            'src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/kaede_0.1.0_x64.dmg'
            'src-tauri/target/x86_64-apple-darwin/release/bundle/macos/kaede.app.tar.gz'
            # macOS ARM
            'src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/kaede_0.1.0_aarch64.dmg'
            'src-tauri/target/aarch64-apple-darwin/release/bundle/macos/kaede.app.tar.gz'
